<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Aagontuk Express Login</title><style>:root{--bg:#07080a;--line:#292c33;--text:#f3eadc;--muted:#b9ad9d;--gold:#d2aa58}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 80% 0,rgba(210,170,88,.18),transparent 35%),#07080a;color:var(--text);font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;display:grid;place-items:center;padding:24px}.box{width:min(440px,100%);border:1px solid var(--line);background:linear-gradient(180deg,#15171b,#0d0f12);border-radius:28px;padding:30px;box-shadow:0 24px 80px rgba(0,0,0,.5)}h1{font-family:Georgia,serif;font-size:42px;line-height:.94;margin:0 0 8px}p{color:var(--muted);line-height:1.55;margin:0 0 22px}.k{letter-spacing:.38em;text-transform:uppercase;color:#f1d789;font-size:12px;font-weight:800;margin-bottom:14px}input,button{width:100%;height:50px;border-radius:16px;font:inherit}input{border:1px solid #30343c;background:#101216;color:var(--text);padding:0 14px;margin-bottom:10px}button{border:1px solid #cda458;background:linear-gradient(180deg,#e0b763,#bd8f3d);color:#140f08;font-weight:850;margin-top:6px}.ghost{background:#121419;color:var(--text);border-color:var(--line)}small{display:block;color:#80776c;margin-top:14px;line-height:1.45}</style></head><body><main class="box"><div class="k">Aagontuk Express</div><h1>Board quietly.</h1><p>Enter the carriage. No profiles. No follower games.</p><input id="email" placeholder="Email"><input id="password" type="password" placeholder="Password"><button id="login">Continue</button><button class="ghost" id="google">Continue with Google</button><small>Frontend page keeps the clean login shell. Existing backend/Firebase auth can be reconnected without changing the visual layer.</small></main><script>document.getElementById('login').onclick=()=>location.href='/';document.getElementById('google').onclick=()=>location.href='/';</script></body></html>
