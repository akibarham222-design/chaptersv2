<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chapters — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0908;--surface:#131110;--surface2:#1a1714;--surface3:#221f1a;
  --border:#252018;--border2:#322c20;
  --gold:#c4973e;--gold-dim:#6b5020;--gold-glow:rgba(196,151,62,0.1);
  --cream:#f0e8d5;--cream2:#c8b898;--muted:#7a6a50;--muted2:#4a3e2a;
  --red:#c0483a;--red-dim:rgba(192,72,58,0.15);
  --green:#4a8060;--green-dim:rgba(74,128,96,0.15);
  --blue:#4a70a0;--blue-dim:rgba(74,112,160,0.15);
}
html,body{min-height:100%;background:var(--bg);color:var(--cream);font-family:'Montserrat',sans-serif;font-size:13px;}

/* Login */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.login-box{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:48px 40px;max-width:380px;width:100%;text-align:center;}
.login-logo{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;color:var(--cream);margin-bottom:4px;}
.login-logo em{color:var(--gold);font-style:italic;}
.login-sub{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:32px;}
.login-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:13px 16px;color:var(--cream);font-family:'Montserrat',sans-serif;font-size:13px;outline:none;margin-bottom:14px;transition:border-color 0.2s;text-align:center;letter-spacing:2px;}
.login-input:focus{border-color:var(--gold-dim);}
.login-btn{width:100%;padding:13px;background:transparent;border:1px solid var(--gold-dim);color:var(--gold);font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;border-radius:6px;cursor:pointer;transition:all 0.2s;}
.login-btn:hover{border-color:var(--gold);box-shadow:0 0 30px var(--gold-glow);}
.login-error{color:var(--red);font-size:10px;margin-top:10px;letter-spacing:0.5px;min-height:16px;}

/* App shell */
#adminApp{display:none;min-height:100vh;flex-direction:column;}
#adminApp.show{display:flex;}

/* Topbar */
.admin-top{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:50;}
.admin-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:var(--cream);}
.admin-logo em{color:var(--gold);font-style:italic;}
.admin-logo span{font-family:'Montserrat',sans-serif;font-size:9px;color:var(--gold-dim);letter-spacing:3px;text-transform:uppercase;margin-left:10px;}
.top-right{display:flex;align-items:center;gap:16px;}
.unread-badge{background:var(--red);color:white;font-size:10px;font-weight:600;padding:2px 8px;border-radius:100px;display:none;}
.unread-badge.show{display:inline-block;}
.btn-logout{background:none;border:none;color:var(--muted);cursor:pointer;font-size:10px;letter-spacing:1px;text-transform:uppercase;transition:color 0.2s;}
.btn-logout:hover{color:var(--cream);}

/* Layout */
.admin-body{display:flex;flex:1;}
.sidebar{width:200px;border-right:1px solid var(--border);padding:20px 0;flex-shrink:0;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;color:var(--muted);transition:all 0.15s;font-size:11px;letter-spacing:1px;text-transform:uppercase;border-left:2px solid transparent;}
.nav-item:hover{color:var(--cream2);background:var(--surface2);}
.nav-item.active{color:var(--gold);border-left-color:var(--gold);background:var(--surface2);}
.nav-icon{font-size:14px;width:18px;text-align:center;}
.nav-badge{margin-left:auto;background:var(--red);color:white;font-size:9px;padding:1px 6px;border-radius:100px;display:none;}
.nav-badge.show{display:inline-block;}

/* Main content */
.main{flex:1;padding:28px;overflow-x:auto;}

/* Pages */
.page{display:none;}
.page.active{display:block;}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:28px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:18px 20px;}
.stat-label{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.stat-value{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:400;color:var(--cream);line-height:1;}
.stat-sub{font-size:9px;color:var(--muted2);margin-top:4px;}
.stat-card.highlight{border-color:var(--red);background:var(--red-dim);}
.stat-card.highlight .stat-value{color:var(--red);}
.stat-card.green{border-color:var(--green);background:var(--green-dim);}
.stat-card.green .stat-value{color:var(--green);}

/* Section header */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.section-title{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}

/* Filter tabs */
.filter-tabs{display:flex;gap:4px;}
.filter-tab{background:none;border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:4px;cursor:pointer;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;transition:all 0.15s;}
.filter-tab.active,.filter-tab:hover{border-color:var(--gold-dim);color:var(--gold);}

/* Search bar */
.search-bar{display:flex;gap:8px;margin-bottom:16px;}
.search-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:9px 14px;color:var(--cream);font-family:'Montserrat',sans-serif;font-size:12px;outline:none;max-width:300px;transition:border-color 0.2s;}
.search-input:focus{border-color:var(--gold-dim);}

/* Table */
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:8px;}
table{width:100%;border-collapse:collapse;}
th{background:var(--surface2);padding:10px 14px;text-align:left;font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:top;font-size:12px;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);}

/* Report row */
.report-reason{color:var(--cream2);font-weight:500;}
.report-names{color:var(--muted);font-size:11px;margin-top:3px;}
.report-date{color:var(--muted2);font-size:10px;white-space:nowrap;}
.unread-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--red);margin-right:6px;flex-shrink:0;}

/* Status badges */
.badge{display:inline-block;padding:2px 10px;border-radius:100px;font-size:9px;letter-spacing:1px;text-transform:uppercase;font-weight:500;}
.badge-red{background:var(--red-dim);color:var(--red);border:1px solid rgba(192,72,58,0.3);}
.badge-green{background:var(--green-dim);color:var(--green);border:1px solid rgba(74,128,96,0.3);}
.badge-gold{background:var(--gold-glow);color:var(--gold);border:1px solid rgba(196,151,62,0.3);}
.badge-muted{background:var(--surface3);color:var(--muted);border:1px solid var(--border);}

/* Action buttons */
.btn-sm{padding:5px 12px;border-radius:4px;font-size:9px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:1px solid var(--border);background:none;color:var(--muted);transition:all 0.15s;white-space:nowrap;}
.btn-sm:hover{border-color:var(--border2);color:var(--cream);}
.btn-sm.danger{border-color:rgba(192,72,58,0.4);color:var(--red);}
.btn-sm.danger:hover{background:var(--red-dim);}
.btn-sm.success{border-color:rgba(74,128,96,0.4);color:var(--green);}
.btn-sm.success:hover{background:var(--green-dim);}
.btn-sm.primary{border-color:var(--gold-dim);color:var(--gold);}
.btn-sm.primary:hover{background:var(--gold-glow);}
.btn-actions{display:flex;gap:6px;flex-wrap:wrap;}

/* Conversation modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;max-width:580px;width:100%;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;color:var(--cream);}
.modal-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;transition:color 0.2s;line-height:1;}
.modal-close:hover{color:var(--cream);}
.modal-body{flex:1;overflow-y:auto;padding:20px 24px;}
.conv-msg{padding:8px 12px;border-radius:8px;margin-bottom:8px;font-size:12px;line-height:1.5;max-width:75%;}
.conv-msg.sender-a{background:var(--surface3);border:1px solid var(--border);margin-right:auto;}
.conv-msg.sender-b{background:rgba(74,112,160,0.15);border:1px solid rgba(74,112,160,0.25);margin-left:auto;}
.conv-msg-who{font-size:9px;color:var(--muted);margin-bottom:3px;letter-spacing:1px;text-transform:uppercase;}
.conv-empty{text-align:center;color:var(--muted);padding:32px;font-style:italic;}
.modal-foot{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;flex-shrink:0;}

/* Pagination */
.pagination{display:flex;gap:8px;align-items:center;margin-top:16px;justify-content:flex-end;}
.page-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:4px;cursor:pointer;font-size:10px;transition:all 0.15s;}
.page-btn:hover:not(:disabled){border-color:var(--border2);color:var(--cream);}
.page-btn:disabled{opacity:0.3;cursor:not-allowed;}
.page-info{font-size:10px;color:var(--muted2);}

/* Empty */
.empty{text-align:center;padding:48px 24px;color:var(--muted);}
.empty-icon{font-size:28px;margin-bottom:10px;}
.empty-text{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;}
</style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Chap<em>ters</em><br/></div>
    <div class="login-sub">Admin Panel</div>
    <input type="password" class="login-input" id="loginPass" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" onclick="doLogin()">Enter</button>
    <div class="login-error" id="loginErr"></div>
  </div>
</div>

<!-- Admin App -->
<div id="adminApp">

  <div class="admin-top">
    <div class="admin-logo">Chap<em>ters</em><span>Admin</span></div>
    <div class="top-right">
      <span class="unread-badge" id="topUnread"></span>
      <button class="btn-logout" onclick="logout()">Sign out</button>
    </div>
  </div>

  <div class="admin-body">

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="nav-item active" onclick="switchPage('dashboard')" id="nav-dashboard">
        <span class="nav-icon">◈</span>Dashboard
      </div>
      <div class="nav-item" onclick="switchPage('reports')" id="nav-reports">
        <span class="nav-icon">⚑</span>Reports
        <span class="nav-badge" id="navReportBadge"></span>
      </div>
      <div class="nav-item" onclick="switchPage('users')" id="nav-users">
        <span class="nav-icon">◉</span>Users
      </div>
    </div>

    <!-- Main -->
    <div class="main">

      <!-- Dashboard -->
      <div class="page active" id="page-dashboard">
        <div class="stats-grid" id="statsGrid">
          <div class="stat-card"><div class="stat-label">Loading</div><div class="stat-value">—</div></div>
        </div>
        <div class="section-head"><div class="section-title">Today at a glance</div></div>
        <div class="stats-grid" id="todayGrid">
          <div class="stat-card"><div class="stat-label">Loading</div><div class="stat-value">—</div></div>
        </div>
      </div>

      <!-- Reports -->
      <div class="page" id="page-reports">
        <div class="section-head">
          <div class="section-title">Reports</div>
          <div class="filter-tabs">
            <button class="filter-tab active" id="rfAll" onclick="setReportFilter('all')">All</button>
            <button class="filter-tab" id="rfUnread" onclick="setReportFilter('unread')">Unread</button>
            <button class="filter-tab" id="rfRead" onclick="setReportFilter('read')">Reviewed</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Report</th>
              <th>Reporter</th>
              <th>Reported User</th>
              <th>Date</th>
              <th>Status</th>
              <th>Actions</th>
            </tr></thead>
            <tbody id="reportsBody"></tbody>
          </table>
        </div>
        <div class="pagination" id="reportsPagination"></div>
      </div>

      <!-- Users -->
      <div class="page" id="page-users">
        <div class="section-head">
          <div class="section-title">All Users</div>
        </div>
        <div class="search-bar">
          <input type="text" class="search-input" id="userSearch" placeholder="Search username..." oninput="searchUsers()"/>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Username</th>
              <th>Chats</th>
              <th>Reports Against</th>
              <th>Joined</th>
              <th>Status</th>
              <th>Actions</th>
            </tr></thead>
            <tbody id="usersBody"></tbody>
          </table>
        </div>
        <div class="pagination" id="usersPagination"></div>
      </div>

    </div>
  </div>
</div>

<!-- Conversation Modal -->
<div class="modal-overlay" id="convModal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="convModalTitle">Conversation</div>
      <button class="modal-close" onclick="closeConvModal()">×</button>
    </div>
    <div class="modal-body" id="convModalBody"></div>
    <div class="modal-foot" id="convModalFoot"></div>
  </div>
</div>

<script>
let PASS = '';
let reportFilter = 'all';
let reportPage = 1;
let userPage = 1;
let userSearchQ = '';
let currentReportId = null;
let currentReportedId = null;

// ── Auth ──────────────────────────────────────────────────────────────────────
async function doLogin() {
  const pass = document.getElementById('loginPass').value;
  if (!pass) return;
  const res = await fetch('/admin/api/stats', { headers: { 'x-admin-password': pass } });
  if (res.status === 401) { document.getElementById('loginErr').textContent = 'Wrong password.'; return; }
  PASS = pass;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminApp').classList.add('show');
  loadDashboard();
  loadReports();
}

function logout() {
  PASS = '';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('adminApp').classList.remove('show');
  document.getElementById('loginPass').value = '';
}

function api(url, opts = {}) {
  return fetch(url, { ...opts, headers: { 'x-admin-password': PASS, 'Content-Type': 'application/json', ...(opts.headers || {}) } });
}

// ── Navigation ────────────────────────────────────────────────────────────────
function switchPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'dashboard') loadDashboard();
  if (name === 'reports') loadReports();
  if (name === 'users') loadUsers();
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
async function loadDashboard() {
  const res = await api('/admin/api/stats');
  const s = await res.json();

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Total Users</div>
      <div class="stat-value">${s.totalUsers}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Chats</div>
      <div class="stat-value">${s.totalChats}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Messages</div>
      <div class="stat-value">${s.totalMessages}</div>
    </div>
    <div class="stat-card ${s.unreadReports > 0 ? 'highlight' : ''}">
      <div class="stat-label">Unread Reports</div>
      <div class="stat-value">${s.unreadReports}</div>
      <div class="stat-sub">${s.totalReports} total</div>
    </div>
    <div class="stat-card ${s.bannedUsers > 0 ? 'highlight' : ''}">
      <div class="stat-label">Banned Users</div>
      <div class="stat-value">${s.bannedUsers}</div>
    </div>`;

  document.getElementById('todayGrid').innerHTML = `
    <div class="stat-card green">
      <div class="stat-label">New Users Today</div>
      <div class="stat-value">${s.todayUsers}</div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">Chats Today</div>
      <div class="stat-value">${s.todayChats}</div>
    </div>
    <div class="stat-card ${s.todayReports > 0 ? 'highlight' : ''}">
      <div class="stat-label">Reports Today</div>
      <div class="stat-value">${s.todayReports}</div>
    </div>`;

  // Update badges
  if (s.unreadReports > 0) {
    document.getElementById('topUnread').textContent = s.unreadReports + ' new';
    document.getElementById('topUnread').classList.add('show');
    document.getElementById('navReportBadge').textContent = s.unreadReports;
    document.getElementById('navReportBadge').classList.add('show');
  } else {
    document.getElementById('topUnread').classList.remove('show');
    document.getElementById('navReportBadge').classList.remove('show');
  }
}

// ── Reports ───────────────────────────────────────────────────────────────────
function setReportFilter(f) {
  reportFilter = f; reportPage = 1;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('rf' + f.charAt(0).toUpperCase() + f.slice(1)).classList.add('active');
  loadReports();
}

async function loadReports() {
  const res = await api(`/admin/api/reports?filter=${reportFilter}&page=${reportPage}`);
  const data = await res.json();
  const tbody = document.getElementById('reportsBody');

  if (data.reports.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty"><div class="empty-icon">◆</div><div class="empty-text">No reports found.</div></div></td></tr>`;
    document.getElementById('reportsPagination').innerHTML = '';
    return;
  }

  tbody.innerHTML = data.reports.map(r => `
    <tr>
      <td>
        ${!r.read_at ? '<span class="unread-dot"></span>' : ''}
        <span class="report-reason">${esc(r.reason)}</span>
        <div class="report-names">Conv: <code style="font-size:10px;color:var(--muted2);">${r.conversation_id.slice(0,8)}…</code></div>
      </td>
      <td><span style="color:var(--cream2);">${esc(r.reporter_name || '—')}</span></td>
      <td>
        <span style="color:var(--cream2);">${esc(r.reported_name || '—')}</span>
        ${r.is_banned ? '<br/><span class="badge badge-red" style="margin-top:4px;">Banned</span>' : ''}
      </td>
      <td class="report-date">${fmtDate(r.created_at * 1000)}</td>
      <td>${r.action_taken ? `<span class="badge badge-gold">${esc(r.action_taken)}</span>` : '<span class="badge badge-muted">Pending</span>'}</td>
      <td>
        <div class="btn-actions">
          <button class="btn-sm primary" onclick="viewConversation('${r.conversation_id}','${r.id}','${r.reported_account}',${r.is_banned})">View Chat</button>
          ${!r.read_at ? `<button class="btn-sm success" onclick="markRead('${r.id}')">Mark read</button>` : ''}
          ${!r.is_banned ? `<button class="btn-sm danger" onclick="banUser('${r.reported_account}','${esc(r.reported_name)}','${r.id}')">Ban</button>` : `<button class="btn-sm" onclick="unbanUser('${r.reported_account}')">Unban</button>`}
        </div>
      </td>
    </tr>`).join('');

  // Pagination
  const totalPages = Math.ceil(data.total / 20);
  document.getElementById('reportsPagination').innerHTML = totalPages > 1 ? `
    <button class="page-btn" onclick="reportPage--;loadReports()" ${reportPage<=1?'disabled':''}>← Prev</button>
    <span class="page-info">Page ${reportPage} of ${totalPages}</span>
    <button class="page-btn" onclick="reportPage++;loadReports()" ${reportPage>=totalPages?'disabled':''}>Next →</button>` : '';
}

async function markRead(reportId) {
  await api(`/admin/api/reports/${reportId}/read`, { method: 'POST', body: JSON.stringify({ action: 'reviewed' }) });
  loadReports(); loadDashboard();
}

async function viewConversation(convId, reportId, reportedId, isBanned) {
  currentReportId = reportId;
  currentReportedId = reportedId;
  document.getElementById('convModalTitle').textContent = 'Conversation ' + convId.slice(0,8) + '…';
  document.getElementById('convModalBody').innerHTML = '<div class="conv-empty">Loading…</div>';
  document.getElementById('convModal').classList.add('show');

  const res = await api(`/admin/api/conversation/${convId}`);
  const data = await res.json();
  const body = document.getElementById('convModalBody');

  if (!data.messages || data.messages.length === 0) {
    body.innerHTML = '<div class="conv-empty">No messages in this conversation.</div>';
  } else {
    const accA = data.conversation?.account_a;
    body.innerHTML = data.messages.map(m => `
      <div class="conv-msg ${m.sender_account === accA ? 'sender-a' : 'sender-b'}">
        <div class="conv-msg-who">${esc(m.username || m.sender_account.slice(0,8))}</div>
        ${esc(m.content)}
      </div>`).join('');
  }

  // Footer actions
  document.getElementById('convModalFoot').innerHTML = `
    <button class="btn-sm" onclick="closeConvModal()">Close</button>
    ${!isBanned ? `<button class="btn-sm danger" onclick="banFromModal()">Ban Reported User</button>` : `<span class="badge badge-red">User is banned</span>`}
    <button class="btn-sm success" onclick="markReadFromModal()">Mark as Reviewed</button>`;
}

function closeConvModal() { document.getElementById('convModal').classList.remove('show'); }

async function markReadFromModal() {
  if (currentReportId) await markRead(currentReportId);
  closeConvModal();
}

async function banFromModal() {
  if (!currentReportedId) return;
  if (!confirm('Ban this user? They will be immediately disconnected and cannot log in again.')) return;
  const res = await api(`/admin/api/ban/${currentReportedId}`, { method: 'POST', body: JSON.stringify({ reason: 'Banned after chat review' }) });
  const data = await res.json();
  if (data.success) { alert(`${data.username} has been banned.`); closeConvModal(); loadReports(); loadDashboard(); }
}

async function banUser(accountId, username, reportId) {
  if (!confirm(`Ban ${username}? They will be disconnected immediately.`)) return;
  const res = await api(`/admin/api/ban/${accountId}`, { method: 'POST', body: JSON.stringify({ reason: `Banned via report` }) });
  const data = await res.json();
  if (data.success) { if (reportId) await markRead(reportId); loadReports(); loadDashboard(); }
}

async function unbanUser(accountId) {
  if (!confirm('Unban this user?')) return;
  await api(`/admin/api/unban/${accountId}`, { method: 'POST' });
  loadReports(); loadUsers(); loadDashboard();
}

// ── Users ─────────────────────────────────────────────────────────────────────
let userSearchTimer;
function searchUsers() {
  clearTimeout(userSearchTimer);
  userSearchTimer = setTimeout(() => { userSearchQ = document.getElementById('userSearch').value; userPage = 1; loadUsers(); }, 300);
}

async function loadUsers() {
  const res = await api(`/admin/api/users?page=${userPage}&q=${encodeURIComponent(userSearchQ)}`);
  const data = await res.json();
  const tbody = document.getElementById('usersBody');

  if (data.users.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty"><div class="empty-icon">◉</div><div class="empty-text">No users found.</div></div></td></tr>`;
    document.getElementById('usersPagination').innerHTML = '';
    return;
  }

  tbody.innerHTML = data.users.map(u => `
    <tr>
      <td><span style="color:var(--cream2);font-weight:500;">${esc(u.username)}</span></td>
      <td>${u.chat_count}</td>
      <td>${u.report_count > 0 ? `<span style="color:${u.report_count >= 3 ? 'var(--red)' : 'var(--cream2)'};">${u.report_count}</span>` : '0'}</td>
      <td style="color:var(--muted);font-size:11px;">${fmtDate(u.created_at * 1000)}</td>
      <td>${u.is_banned ? '<span class="badge badge-red">Banned</span>' : '<span class="badge badge-green">Active</span>'}</td>
      <td>
        <div class="btn-actions">
          ${!u.is_banned
            ? `<button class="btn-sm danger" onclick="banUser('${u.id}','${esc(u.username)}',null)">Ban</button>`
            : `<button class="btn-sm" onclick="unbanUser('${u.id}')">Unban</button>`}
        </div>
      </td>
    </tr>`).join('');

  const totalPages = Math.ceil(data.total / 30);
  document.getElementById('usersPagination').innerHTML = totalPages > 1 ? `
    <button class="page-btn" onclick="userPage--;loadUsers()" ${userPage<=1?'disabled':''}>← Prev</button>
    <span class="page-info">Page ${userPage} of ${totalPages}</span>
    <button class="page-btn" onclick="userPage++;loadUsers()" ${userPage>=totalPages?'disabled':''}>Next →</button>` : '';
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(t) { const d = document.createElement('div'); d.appendChild(document.createTextNode(t || '')); return d.innerHTML; }
function fmtDate(ts) { return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' }); }

// Auto-refresh every 60s when on dashboard
setInterval(() => { if (document.getElementById('page-dashboard').classList.contains('active')) loadDashboard(); }, 60000);
</script>
</body>
